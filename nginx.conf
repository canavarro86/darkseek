# Single worker is plenty for a 1GB box fronting one upstream.
worker_processes 1;

events {
    # 512 connections on a single worker fits the 1GB box comfortably and gives
    # headroom over the previous 256 under bursty client load.
    worker_connections 512;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Don't leak the nginx version in headers/error pages.
    server_tokens off;

    sendfile        on;
    keepalive_timeout 15;
    client_header_timeout 10s;
    client_body_timeout   10s;
    client_max_body_size 1m;

    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/html;
    gzip_min_length 1024;

    # Bound the memory nginx buffers per upstream response.
    proxy_buffering   on;
    proxy_buffer_size 4k;
    proxy_buffers     4 4k;

    # Rate limit zones by client IP.
    limit_req_zone    $binary_remote_addr zone=api_limit:10m    rate=10r/m;
    limit_req_zone    $binary_remote_addr zone=static_limit:10m rate=30r/m;

    # Connection limit zone (mitigates connection-flood / Slowloris).
    limit_conn_zone   $binary_remote_addr zone=conn_limit:10m;

    # Return 429 instead of default 503 when rate limited.
    limit_req_status  429;
    limit_conn_status 429;

    upstream api {
        server api:8000;
        # Reuse upstream connections instead of opening a new one per request,
        # cutting connect overhead to the gunicorn workers. Requires HTTP/1.1
        # and a cleared Connection header on the proxied locations below.
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # Max 10 simultaneous connections per IP.
        limit_conn conn_limit 10;

        # Security headers applied to every response.
        add_header X-Frame-Options        "SAMEORIGIN"                 always;
        add_header X-Content-Type-Options "nosniff"                    always;
        add_header Referrer-Policy         "no-referrer"               always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline'; img-src 'self' data:; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com;" always;

        # Serve the static frontend (rate limited)
        location = /submit {
            limit_req zone=static_limit burst=10 nodelay;
            try_files $uri /submit.html =404;
        }

        location = /donate {
            limit_req zone=static_limit burst=10 nodelay;
            try_files $uri /donate.html =404;
        }

        # Commands reference page
        location = /faq {
            limit_req zone=static_limit burst=10 nodelay;
            try_files $uri /faq.html =404;
        }

        location / {
            limit_req zone=static_limit burst=10 nodelay;
            try_files $uri $uri/ /index.html;
        }

        # Proxy search API (rate limited)
        location /api/ {
            limit_req zone=api_limit burst=5 nodelay;
            proxy_pass         http://api;
            # Enable upstream keepalive (see `keepalive 32` in the api upstream).
            proxy_http_version 1.1;
            proxy_set_header   Connection         "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        # Proxy health check (public — needed by CI/CD and UptimeRobot)
        location /health {
            proxy_pass       http://api/health;
            proxy_set_header Host $host;
        }

        # Stats — public (frontend shows page count)
        location /stats {
            limit_req zone=static_limit burst=10 nodelay;
            proxy_pass       http://api/stats;
            proxy_set_header Host $host;
        }

        # Operational metrics — internal only
        location /metrics {
            allow 127.0.0.1;
            allow 172.16.0.0/12;   # Docker internal network
            deny  all;
            proxy_pass       http://api/metrics;
            proxy_set_header Host $host;
        }
    }
}