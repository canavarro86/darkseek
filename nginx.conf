# Single worker is plenty for a 1GB box fronting one upstream.
worker_processes 1;

events {
    # 512 connections on a single worker fits the 1GB box comfortably and gives
    # headroom over the previous 256 under bursty client load.
    worker_connections 512;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Don't leak the nginx version in headers/error pages.
    server_tokens off;
    server_names_hash_bucket_size 128;

    # No-logs policy (see /privacy.html). We never write client requests to disk:
    # no IPs, no search queries, no user agents. error_log keeps only crit-level
    # events (process failures) to /dev/null so nothing per-request is retained.
    access_log off;
    error_log  /dev/null crit;

    sendfile        on;
    keepalive_timeout 15;
    client_header_timeout 10s;
    client_body_timeout   10s;
    client_max_body_size 1m;

    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    # Bound the memory nginx buffers per upstream response.
    proxy_buffering   on;
    proxy_buffer_size 4k;
    proxy_buffers     4 4k;

    # Rate limit zones by client IP.
    limit_req_zone    $binary_remote_addr zone=api_limit:10m    rate=10r/m;
    limit_req_zone    $binary_remote_addr zone=static_limit:10m rate=30r/m;

    # Connection limit zone (mitigates connection-flood / Slowloris).
    limit_conn_zone   $binary_remote_addr zone=conn_limit:10m;

    # Return 429 instead of default 503 when rate limited.
    limit_req_status  429;
    limit_conn_status 429;

    upstream api {
        server api:8000;
        # Reuse upstream connections instead of opening a new one per request,
        # cutting connect overhead to the gunicorn workers. Requires HTTP/1.1
        # and a cleared Connection header on the proxied locations below.
        keepalive 32;
    }

    # BLOCK 1 — public search. Served on both the legacy and the new vanity
    # onion address. Admin routes are explicitly 404'd here so the admin panel
    # is never reachable through a public address.
    server {
        listen 80;
        server_name 37mj2uc7sls76pah7op7xeq7nrskfpircrvycpceyifvwftrxiydubyd.onion
                    darkszcni4tmrlpociezfczxh3b3zemlmcfvu7iiv7n242u2eaff5wyd.onion;

        root  /usr/share/nginx/html;
        index index.html;

        # Max 10 simultaneous connections per IP.
        limit_conn conn_limit 10;

        # Security headers applied to every response.
        add_header X-Frame-Options        "SAMEORIGIN"                 always;
        add_header X-Content-Type-Options "nosniff"                    always;
        add_header Referrer-Policy         "no-referrer"               always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline'; img-src 'self' data:; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com;" always;

        # Block admin routes on the public address (longest-prefix match wins
        # over /api/ and /, so these short-circuit before any proxy_pass).
        location /admin { return 404; }
        location /api/admin { return 404; }

        # Serve the static frontend (rate limited)
        location = /submit {
            limit_req zone=static_limit burst=10 nodelay;
            try_files $uri /submit.html =404;
        }

        location = /donate {
            limit_req zone=static_limit burst=10 nodelay;
            try_files $uri /donate.html =404;
        }

        # Commands reference page
        location = /faq {
            limit_req zone=static_limit burst=10 nodelay;
            try_files $uri /faq.html =404;
        }

        # Privacy policy / no-logs manifesto
        location = /privacy {
            limit_req zone=static_limit burst=10 nodelay;
            try_files $uri /privacy.html =404;
        }

        # About page
        location = /about {
            limit_req zone=static_limit burst=10 nodelay;
            try_files $uri /about.html =404;
        }

        # Terms of service
        location = /terms {
            limit_req zone=static_limit burst=10 nodelay;
            root /usr/share/nginx/html;
            try_files /terms.html =404;
        }

        # Disclaimer
        location = /disclaimer {
            limit_req zone=static_limit burst=10 nodelay;
            root /usr/share/nginx/html;
            try_files /disclaimer.html =404;
        }

        location / {
            limit_req zone=static_limit burst=10 nodelay;
            try_files $uri $uri/ /index.html;
        }

        # Proxy search API (rate limited)
        location /api/ {
            limit_req zone=api_limit burst=5 nodelay;
            proxy_pass         http://api;
            # Enable upstream keepalive (see `keepalive 32` in the api upstream).
            proxy_http_version 1.1;
            proxy_set_header   Connection         "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Proxy health check (public — needed by CI/CD and UptimeRobot)
        location /health {
            proxy_pass       http://api/health;
            proxy_set_header Host $host;
        }

        # Stats — public (frontend shows page count)
        location /stats {
            limit_req zone=static_limit burst=10 nodelay;
            proxy_pass       http://api/stats;
            proxy_set_header Host $host;
        }

        # Operational metrics — internal only
        location /metrics {
            allow 127.0.0.1;
            allow 172.16.0.0/12;   # Docker internal network
            deny  all;
            proxy_pass       http://api/metrics;
            proxy_set_header Host $host;
        }

        # API docs (FIX 5): Swagger UI + the OpenAPI spec it renders. Public.
        location = /openapi.json {
            limit_req zone=static_limit burst=10 nodelay;
            proxy_pass       http://api/openapi.json;
            proxy_set_header Host $host;
        }
        location = /docs {
            limit_req zone=static_limit burst=10 nodelay;
            proxy_pass       http://api/docs;
            proxy_set_header Host $host;
        }
    }

    # BLOCK 2 — admin panel. Only reachable through the private admin onion
    # address. Everything except the admin routes returns 404.
    server {
        listen 80;
        server_name adminov3whi5tnbdh2nh4436ozaysyotcsxkjtfn4koyygusmcaphrad.onion;

        # Block everything except admin routes.
        location / { return 404; }

        location = /admin {
            root /usr/share/nginx/html;
            try_files /admin.html =404;
        }

        location /api/admin {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/removal-request {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # BLOCK 3 — default. Drop all direct-IP / unknown-Host requests with no
    # response so the deployment is only reachable via the onion addresses.
    server {
        listen 80 default_server;
        return 444;
    }
}
