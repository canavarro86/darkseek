# Single worker is plenty for a 1GB box fronting one upstream.
worker_processes 1;

events {
    worker_connections 256;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Don't leak the nginx version in headers/error pages.
    server_tokens off;

    sendfile        on;
    keepalive_timeout 15;
    client_max_body_size 1m;

    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/html;
    gzip_min_length 1024;

    # Bound the memory nginx buffers per upstream response.
    proxy_buffering   on;
    proxy_buffer_size 4k;
    proxy_buffers     4 4k;

    # Rate limit the API by client IP: 10 requests/minute with a small burst.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;

    upstream api {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # Security headers applied to every response.
        add_header X-Frame-Options        "SAMEORIGIN"      always;
        add_header X-Content-Type-Options "nosniff"         always;
        add_header Referrer-Policy         "no-referrer"     always;

        # Serve the static frontend
        location = /submit {
            try_files /submit.html =404;
        }

        location = /donate {
            try_files /donate.html =404;
        }

        # Commands reference page
        location = /faq {
            try_files /faq.html =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy search API (rate limited)
        location /api/ {
            limit_req zone=api_limit burst=5 nodelay;
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # Proxy health check
        location /health {
            proxy_pass       http://api/health;
            proxy_set_header Host $host;
        }

        location /stats {
            proxy_pass       http://api/stats;
            proxy_set_header Host $host;
        }

        # Operational metrics (crawler stats, db size)
        location /metrics {
            proxy_pass       http://api/metrics;
            proxy_set_header Host $host;
        }
    }
}
