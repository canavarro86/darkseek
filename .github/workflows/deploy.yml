name: Deploy to Production darkseek search

on:
  push:
    branches: [main]
permissions:
   contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2020
          script: |
            cd /opt/darkseek
            git stash
            git pull origin main || exit 1

            # Free disk before a --no-cache rebuild: clear dangling images,
            # stopped containers and unused layers so the build can't fail on a
            # full disk (a recurring cause of wedged deploys on the 1GB box).
            docker system prune -f

            docker compose down

            # Cap the build at 10 minutes so a hung pull/build can't block deploy.
            if ! timeout 600 docker compose build --no-cache; then
              echo "Build failed or timed out — restarting previous containers"
              docker compose up -d --remove-orphans || true
              exit 1
            fi

            docker compose up -d --remove-orphans

            # Wait for the API to become healthy instead of a blind sleep (FIX 6).
            # Polls /health every 5s up to 180s; fails the deploy if it never comes up.
            TIMEOUT=180
            ELAPSED=0
            until curl -sf -H "Host: 37mj2uc7sls76pah7op7xeq7nrskfpircrvycpceyifvwftrxiydubyd.onion" http://localhost/health > /dev/null 2>&1; do
              sleep 5
              ELAPSED=$((ELAPSED + 5))
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "ERROR: Service did not become healthy within ${TIMEOUT}s"
                exit 1
              fi
            done
            echo "Service is healthy after ${ELAPSED}s"

            # --- Health verification ----------------------------------------
            # curl retries while containers settle: 5 attempts, 10s apart, and
            # retry on connection-refused (API not yet listening). On ANY failed
            # check we roll back by recreating containers from the locally cached
            # images, then fail the job.
            ok=1

            curl -sf --retry 5 --retry-delay 10 --retry-connrefused \
              -H "Host: 37mj2uc7sls76pah7op7xeq7nrskfpircrvycpceyifvwftrxiydubyd.onion" http://localhost/health | grep -q '"status":"ok"' || ok=0

            curl -sf --retry 5 --retry-delay 10 --retry-connrefused \
              -H "Host: 37mj2uc7sls76pah7op7xeq7nrskfpircrvycpceyifvwftrxiydubyd.onion" "http://localhost/api/search?q=forum" | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            assert d['total'] > 0, 'search returned 0 results'
            urls = [r['url'] for r in d['results']]
            assert len(urls) == len(set(urls)), 'duplicate URLs in results'
            print('search OK')
            " || ok=0

            curl -sf --retry 5 --retry-delay 10 --retry-connrefused \
              -H "Host: 37mj2uc7sls76pah7op7xeq7nrskfpircrvycpceyifvwftrxiydubyd.onion" http://localhost/stats | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            assert d['total_pages'] > 0, 'DB empty'
            print('stats OK')
            " || ok=0

            if [ "$ok" -ne 1 ]; then
              echo "Health check failed — rolling back (restart from cached images)"
              docker compose up -d --force-recreate --remove-orphans
              exit 1
            fi

            echo "Deploy OK"