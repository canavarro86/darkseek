name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2020
          script: |
            cd /opt/darkseek
            git stash
            git pull origin main
            docker compose down
            docker compose build --no-cache
            docker compose up -d --remove-orphans
            sleep 60

            # Health check
            curl -sf http://localhost/health | grep -q '"status":"ok"' || exit 1

            # API responds
            curl -sf "http://localhost/api/search?q=forum" | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            assert d['total'] > 0, 'search returned 0 results'
            urls = [r['url'] for r in d['results']]
            assert len(urls) == len(set(urls)), 'duplicate URLs in results'
            print('All checks passed')
            " || exit 1

            # Stats
            curl -sf http://localhost/stats | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            assert d['total_pages'] > 0, 'DB empty'
            " || exit 1

            echo "Deploy OK"