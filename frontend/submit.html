<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DarkSeek — Submit Onion</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050f05;
      background-image:
        radial-gradient(ellipse 120% 40% at 50% 60%, rgba(0,255,65,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 80% 30% at 20% 70%, rgba(0,200,80,0.04) 0%, transparent 50%),
        radial-gradient(ellipse 80% 30% at 80% 65%, rgba(0,255,100,0.03) 0%, transparent 50%);
      color: rgba(0,255,65,0.85);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 3px,
        rgba(0,255,65,0.018) 3px, rgba(0,255,65,0.018) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .skyline {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 260px;
      pointer-events: none;
      z-index: 1;
    }
    .skyline svg { width: 100%; height: 100%; }

    .fog {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(5,15,5,0.95) 0%, transparent 100%),
        linear-gradient(180deg, rgba(5,15,5,0) 30%, rgba(0,255,65,0.03) 55%, rgba(5,15,5,0.7) 75%, rgba(5,15,5,1) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .page {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 1rem 9rem;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,255,65,0.35);
      text-transform: uppercase;
      margin-top: 3.5rem;
      margin-bottom: 1.25rem;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
    .dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #00ff41;
      box-shadow: 0 0 6px #00ff41;
      margin-right: 6px;
      flex-shrink: 0;
      animation: blink 2s infinite;
    }

    .logo {
      font-size: 52px;
      letter-spacing: 6px;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 0.6rem;
      user-select: none;
    }
    .logo-dark {
      color: #e0ffe8;
      text-shadow:
        0 0 20px rgba(0,255,65,0.8),
        0 0 60px rgba(0,255,65,0.3),
        2px 0 0 rgba(0,200,80,0.4),
        -2px 0 0 rgba(0,255,65,0.3);
    }
    .logo-seek {
      color: #00ff41;
      text-shadow:
        0 0 20px rgba(0,255,65,1),
        0 0 80px rgba(0,255,65,0.5);
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(0,255,65,0.35);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .submit-form {
      display: flex;
      width: 100%;
      max-width: 520px;
      margin-bottom: 0.75rem;
    }
    #submit-url {
      flex: 1;
      background: rgba(0,255,65,0.03);
      border: 1px solid rgba(0,255,65,0.30);
      border-right: none;
      color: #c0ffd0;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      box-shadow:
        0 0 20px rgba(0,255,65,0.08),
        inset 0 0 20px rgba(0,255,65,0.02);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #submit-url:focus {
      border-color: rgba(0,255,65,0.60);
      box-shadow:
        0 0 30px rgba(0,255,65,0.15),
        inset 0 0 20px rgba(0,255,65,0.04);
    }
    #submit-url::placeholder { color: rgba(0,255,65,0.25); }

    #submit-btn {
      background: rgba(0,255,65,0.12);
      border: 1px solid rgba(0,255,65,0.30);
      color: #00ff41;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 0.75rem 1.4rem;
      text-transform: uppercase;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #submit-btn:hover    { background: rgba(0,255,65,0.25); }
    #submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .feedback {
      font-size: 11px;
      letter-spacing: 1.5px;
      min-height: 1.5rem;
      margin: 0.5rem 0 1rem;
      text-align: center;
      color: rgba(0,255,65,0.35);
    }
    .feedback.ok     { color: rgba(0,255,65,0.85); }
    .feedback.err    { color: rgba(255,50,50,0.6); }
    .feedback.exists { color: rgba(0,255,65,0.50); }

    .back-link {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(0,255,65,0.35);
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(0,255,65,0.15);
      padding-bottom: 1px;
      margin-top: 0.5rem;
      transition: color 0.15s, border-bottom-color 0.15s;
    }
    .back-link:hover {
      color: rgba(0,255,65,0.75);
      border-bottom-color: rgba(0,255,65,0.5);
    }

    .quote {
      color: rgba(0,255,65,0.20);
      font-size: 11px;
      letter-spacing: 1.5px;
      margin-top: 3rem;
      margin-bottom: 2rem;
      text-align: center;
      max-width: 480px;
    }

    .footer-onion {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0,255,65,0.12);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
    }

    /* ---- mobile ---- */
    @media (max-width: 600px) {
      .page         { padding: 0 0.75rem 7rem; }
      .eyebrow      { font-size: 14px; letter-spacing: 2px; margin-top: 2.5rem; text-align: center; }
      .logo         { font-size: 40px; letter-spacing: 3px; }
      .subtitle     { font-size: 14px; letter-spacing: 2px; }
      .submit-form  { flex-direction: column; gap: 0.5rem; }
      #submit-url   { border-right: 1px solid rgba(0,255,65,0.30); font-size: 16px; min-height: 44px; width: 100%; }
      #submit-btn   { font-size: 14px; min-height: 44px; width: 100%; padding: 0.75rem 1rem; }
      .feedback     { font-size: 14px; }
      .back-link    { font-size: 14px; }
      .quote        { font-size: 14px; }
      .footer-onion { font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="skyline">

    <defs>

    <!-- Windows -->
    <rect x="38"  y="115" width="5" height="4" fill="rgba(0,255,65,0.14)"/>
    <rect x="52"  y="115" width="5" height="4" fill="rgba(0,255,65,0.10)"/>
    <rect x="38"  y="128" width="5" height="4" fill="rgba(0,255,65,0.18)"/>
    <rect x="97"  y="88"  width="5" height="4" fill="rgba(0,255,65,0.12)"/>
    <rect x="110" y="88"  width="5" height="4" fill="rgba(0,255,65,0.16)"/>

    <rect x="198" y="95"  width="6" height="4" fill="rgba(0,255,65,0.20)"/>
    <rect x="212" y="95"  width="6" height="4" fill="rgba(0,255,65,0.14)"/>
    <rect x="198" y="108" width="6" height="4" fill="rgba(0,255,65,0.10)"/>
    <rect x="212" y="108" width="6" height="4" fill="rgba(0,255,65,0.18)"/>

    <rect x="340" y="65"  width="6" height="5" fill="rgba(0,255,65,0.12)"/>
    <rect x="355" y="65"  width="6" height="5" fill="rgba(0,255,65,0.18)"/>
    <rect x="310" y="80"  width="6" height="5" fill="rgba(0,255,65,0.10)"/>

    <rect x="515" y="80"  width="6" height="4" fill="rgba(0,255,65,0.14)"/>

    <rect x="0"  y="228" width="700" height="32"  fill="rgba(5,15,5,0.85)"/>
    <line x1="0" y1="228" x2="700"  y2="228"      stroke="rgba(0,255,65,0.18)" stroke-width="0.5"/>
    <rect x="0"  y="225" width="700" height="4"   fill="url(#glow)"/>

    <!-- Accent spires -->
    <rect x="288" y="198" width="4" height="30" fill="rgba(0,255,65,0.35)"/>
    <rect x="348" y="193" width="3" height="35" fill="rgba(0,255,65,0.28)"/>
    <rect x="418" y="203" width="4" height="25" fill="rgba(0,255,65,0.32)"/>
  </svg>
</div>

<div class="fog"></div>

<div class="page">
  <div class="eyebrow"><span class="dot"></span>submit to index</div>

  <h1 class="logo"><span class="logo-dark">DARK</span><span class="logo-seek">SEEK</span></h1>

  <p class="subtitle">add your onion service</p>

  <form class="submit-form" id="submit-form" onsubmit="submitSite(); return false;">
    <input id="submit-url" type="text" placeholder="http://abc...xyz.onion/" autocomplete="off" spellcheck="false" />
    <button type="submit" id="submit-btn">Submit</button>
  </form>

  <div id="feedback" class="feedback"></div>

  <a href="/" class="back-link">← back to search</a>

  <p class="quote">"information wants to be free" — Stewart Brand, 1984</p>
</div>

<footer class="footer-onion">37mj2uc7...onion</footer>

<script>
  const ONION_RE = /^https?:\/\/[a-z2-7]{56}\.onion(\/.*)?$/;

  function setFeedback(msg, cls) {
    const el = document.getElementById('feedback');
    el.textContent = msg;
    el.className = 'feedback' + (cls ? ' ' + cls : '');
  }

  async function submitSite() {
    const input = document.getElementById('submit-url');
    const url   = input.value.trim();
    const btn   = document.getElementById('submit-btn');

    if (!ONION_RE.test(url)) {
      setFeedback('✗ Must be a valid v3 .onion URL (56-char host).', 'err');
      return;
    }

    btn.disabled = true;
    setFeedback('Submitting…', '');

    try {
      const res  = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      const data = await res.json().catch(() => ({}));

      if (data.status === 'queued') {
        input.value = '';
        setFeedback('✓ URL added to crawl queue', 'ok');
      } else if (data.status === 'exists') {
        setFeedback('• ' + (data.message || 'Already indexed'), 'exists');
      } else {
        setFeedback('✗ ' + (data.message || `HTTP ${res.status}`), 'err');
      }
    } catch (e) {
      setFeedback('✗ Network error — is the API running?', 'err');
    } finally {
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
