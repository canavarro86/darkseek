<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DarkSeek — Hidden Web Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050f05;
      background-image:
        radial-gradient(ellipse 120% 40% at 50% 60%, rgba(0,255,65,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 80% 30% at 20% 70%, rgba(0,200,80,0.04) 0%, transparent 50%),
        radial-gradient(ellipse 80% 30% at 80% 65%, rgba(0,255,100,0.03) 0%, transparent 50%);
      color: rgba(0,255,65,0.85);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 3px,
        rgba(0,255,65,0.018) 3px, rgba(0,255,65,0.018) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .skyline {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 260px;
      pointer-events: none;
      z-index: 1;
    }
    .skyline svg { width: 100%; height: 100%; }

    .fog {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(5,15,5,0.95) 0%, transparent 100%),
        linear-gradient(180deg, rgba(5,15,5,0) 30%, rgba(0,255,65,0.03) 55%, rgba(5,15,5,0.7) 75%, rgba(5,15,5,1) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .page {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 1rem 9rem;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,255,65,0.35);
      text-transform: uppercase;
      margin-top: 3.5rem;
      margin-bottom: 1.25rem;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
    .dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #00ff41;
      box-shadow: 0 0 6px #00ff41;
      margin-right: 6px;
      flex-shrink: 0;
      animation: blink 2s infinite;
    }

    .logo {
      font-size: 52px;
      letter-spacing: 6px;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 0.6rem;
      user-select: none;
    }
    .logo-dark {
      color: #e0ffe8;
      text-shadow:
        0 0 20px rgba(0,255,65,0.8),
        0 0 60px rgba(0,255,65,0.3),
        2px 0 0 rgba(0,200,80,0.4),
        -2px 0 0 rgba(0,255,65,0.3);
    }
    .logo-seek {
      color: #00ff41;
      text-shadow:
        0 0 20px rgba(0,255,65,1),
        0 0 80px rgba(0,255,65,0.5);
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(0,255,65,0.35);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .search-wrap {
      display: flex;
      width: 100%;
      max-width: 520px;
      margin-bottom: 0.75rem;
    }
    #query {
      flex: 1;
      background: rgba(0,255,65,0.03);
      border: 1px solid rgba(0,255,65,0.30);
      border-right: none;
      color: #c0ffd0;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      box-shadow:
        0 0 20px rgba(0,255,65,0.08),
        inset 0 0 20px rgba(0,255,65,0.02);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #query:focus {
      border-color: rgba(0,255,65,0.60);
      box-shadow:
        0 0 30px rgba(0,255,65,0.15),
        inset 0 0 20px rgba(0,255,65,0.04);
    }
    #query::placeholder { color: rgba(0,255,65,0.25); }

    #search-btn {
      background: rgba(0,255,65,0.12);
      border: 1px solid rgba(0,255,65,0.30);
      color: #00ff41;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 0.75rem 1.4rem;
      text-transform: uppercase;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #search-btn:hover    { background: rgba(0,255,65,0.25); }
    #search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .submit-link {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(0,255,65,0.35);
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(0,255,65,0.15);
      padding-bottom: 1px;
      transition: color 0.15s, border-bottom-color 0.15s;
    }
    .submit-link:hover {
      color: rgba(0,255,65,0.75);
      border-bottom-color: rgba(0,255,65,0.5);
    }

    .stats {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(0,255,65,0.25);
      text-transform: uppercase;
      margin-bottom: 1.75rem;
    }
    .stats .hi { color: rgba(0,255,65,0.60); }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      max-width: 520px;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid rgba(0,255,65,0.22);
      color: rgba(0,255,65,0.35);
      cursor: pointer;
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 1.5px;
      padding: 0.3rem 0.75rem;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .filter-btn:hover,
    .filter-btn.active {
      border-color: rgba(0,255,65,0.60);
      color: #00ff41;
      background: rgba(0,255,65,0.05);
    }

    #results-area {
      width: 100%;
      max-width: 640px;
    }

    .meta-bar {
      color: rgba(0,255,65,0.35);
      font-size: 10px;
      letter-spacing: 2px;
      margin-bottom: 1.25rem;
      text-transform: uppercase;
    }
    .meta-bar span { color: rgba(0,255,65,0.75); }

    .result {
      border: 1px solid rgba(0,255,65,0.12);
      margin-bottom: 0.75rem;
      padding: 0.9rem 1.1rem;
      background: rgba(0,255,65,0.02);
      transition: border-color 0.15s, background 0.15s;
    }
    .result:hover {
      border-color: rgba(0,255,65,0.28);
      background: rgba(0,255,65,0.035);
    }
    .result-title a {
      color: rgba(0,255,65,0.90);
      font-size: 0.95rem;
      text-decoration: none;
    }
    .result-title a:hover { color: #00ff41; text-decoration: underline; }

    .result-url {
      color: rgba(0,255,65,0.25);
      font-size: 0.68rem;
      margin: 0.2rem 0 0.5rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-desc {
      color: rgba(0,255,65,0.65);
      font-size: 0.82rem;
      line-height: 1.5;
    }
    .result-footer {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.6rem;
    }
    .result-dates {
      display: flex;
      gap: 1rem;
      margin-top: 0.4rem;
      font-size: 0.65rem;
      color: rgba(0,255,65,0.25);
    }

    .badge {
      font-size: 0.6rem;
      letter-spacing: 1px;
      padding: 0.12rem 0.45rem;
      text-transform: uppercase;
      border: 1px solid rgba(0,255,65,0.2);
      background: rgba(0,255,65,0.05);
      color: rgba(0,255,65,0.50);
    }
    .badge.forum   { background: rgba(0,255,65,0.15); border-color: rgba(0,255,65,0.4);  }
    .badge.market  { background: rgba(0,255,65,0.10); border-color: rgba(0,255,65,0.3);  }
    .badge.news    { background: rgba(0,255,65,0.12); border-color: rgba(0,255,65,0.35); }
    .badge.wiki    { background: rgba(0,255,65,0.08); border-color: rgba(0,255,65,0.25); }
    .badge.service { background: rgba(0,255,65,0.12); border-color: rgba(0,255,65,0.3);  }
    .badge.other   { background: rgba(0,255,65,0.05); border-color: rgba(0,255,65,0.2);  }

    /* Freshness badges (v1.4). Driven entirely by the API `freshness_tier`. */
    .badge-fresh {
      font-size: 0.65rem;
      letter-spacing: 1px;
      padding: 0.12rem 0.45rem;
      text-transform: uppercase;
      background: #00ff41;
      color: #000;
    }
    .badge-archived {
      font-size: 0.65rem;
      letter-spacing: 1px;
      padding: 0.12rem 0.45rem;
      text-transform: uppercase;
      background: #444;
      color: #888;
    }

    .result-lang  { color: rgba(0,255,65,0.30); font-size: 0.68rem; }
    .result-score { color: rgba(0,255,65,0.25); font-size: 0.68rem; margin-left: auto; }

    /* Matched search terms, highlighted in result titles + descriptions. */
    mark {
      background: #003300;
      color: #00ff41;
      border-bottom: 1px solid #00ff41;
    }

    .state-msg {
      color: rgba(0,255,65,0.35);
      font-size: 0.85rem;
      letter-spacing: 2px;
      padding: 3rem 0;
      text-align: center;
    }
    .state-msg.error { color: rgba(255,50,50,0.7); }

    .spinner {
      border: 2px solid rgba(0,255,65,0.15);
      border-top-color: #00ff41;
      border-radius: 50%;
      display: inline-block;
      height: 1.5rem; width: 1.5rem;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pagination {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
      margin-top: 2rem;
    }
    .page-btn {
      background: transparent;
      border: 1px solid rgba(0,255,65,0.22);
      color: rgba(0,255,65,0.35);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      min-width: 2.5rem;
      padding: 0.35rem 0.7rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .page-btn:hover:not(:disabled) { border-color: rgba(0,255,65,0.60); color: #00ff41; }
    .page-btn.active               { border-color: rgba(0,255,65,0.60); color: #00ff41; }
    .page-btn:disabled             { opacity: 0.3; cursor: not-allowed; }

    .retry-btn {
      background: transparent;
      border: 1px solid rgba(0,255,65,0.35);
      color: rgba(0,255,65,0.60);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 2px;
      margin-top: 1rem;
      padding: 0.5rem 1.25rem;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }
    .retry-btn:hover { background: rgba(0,255,65,0.10); color: #00ff41; }

    .quote {
      color: rgba(0,255,65,0.20);
      font-size: 11px;
      letter-spacing: 1.5px;
      margin-top: 3rem;
      margin-bottom: 2rem;
      text-align: center;
      max-width: 480px;
    }

    .footer-onion {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0,255,65,0.12);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
    }

    /* ---- instant answer card ---- */
    /* Rendered above search results when the query matches a command. */
    .instant-card {
      border: 1px solid rgba(0,255,65,0.12);
      border-left: 3px solid #00ff41;
      background: rgba(0,255,65,0.03);
      margin-bottom: 1.25rem;
      padding: 0.9rem 1.1rem;
    }
    .instant-head {
      display: flex;
      align-items: center;
      color: rgba(0,255,65,0.45);
      font-size: 11px;
      letter-spacing: 2px;
      margin-bottom: 0.75rem;
    }
    .instant-close {
      margin-left: auto;
      background: none;
      border: none;
      color: rgba(0,255,65,0.45);
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
      line-height: 1;
      padding: 0 0.25rem;
    }
    .instant-close:hover { color: #00ff41; }
    .instant-body {
      color: #00ff41;
      font-size: 0.95rem;
      line-height: 1.6;
      word-break: break-all;
      user-select: text;          /* result must be selectable/copyable */
      background: rgba(0,255,65,0.04);
      border: 1px solid rgba(0,255,65,0.12);
      padding: 0.65rem 0.75rem;
      margin-bottom: 0.7rem;
    }
    .instant-body.qr {
      background: #0a0a0a;        /* QR needs a flat dark backdrop to scan */
      display: flex;
      justify-content: center;
    }
    .instant-body.err { color: rgba(255,80,80,0.85); }
    .instant-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .instant-btn {
      background: rgba(0,255,65,0.08);
      border: 1px solid rgba(0,255,65,0.28);
      color: #00ff41;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1.5px;
      padding: 0.5rem 1rem;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }
    .instant-btn:hover { background: rgba(0,255,65,0.2); }
    .instant-btn.copied { background: rgba(0,255,65,0.3); color: #e0ffe8; }
    .instant-note {
      color: rgba(0,255,65,0.4);
      font-size: 0.72rem;
      letter-spacing: 1px;
      margin-top: 0.5rem;
      line-height: 1.5;
    }

    /* ---- mobile ---- */
    @media (max-width: 600px) {
      .page          { padding: 0 0.75rem 7rem; }
      .instant-head  { font-size: 14px; }
      .instant-body  { font-size: 16px; }
      .instant-btn   { font-size: 14px; min-height: 44px; }
      .instant-note  { font-size: 13px; }
      .eyebrow       { font-size: 14px; letter-spacing: 2px; margin-top: 2.5rem; text-align: center; }
      .logo          { font-size: 40px; letter-spacing: 3px; }
      .subtitle      { font-size: 14px; letter-spacing: 2px; }
      .search-wrap   { flex-direction: column; gap: 0.5rem; }
      #query         { border-right: 1px solid rgba(0,255,65,0.30); font-size: 16px; min-height: 44px; width: 100%; }
      #search-btn    { font-size: 14px; min-height: 44px; width: 100%; padding: 0.75rem 1rem; }
      .nav-links     { gap: 1rem; }
      .submit-link   { font-size: 14px; }
      .stats         { font-size: 14px; text-align: center; line-height: 1.7; }
      .filters       { gap: 0.5rem; }
      .filter-btn    { font-size: 14px; min-height: 44px; padding: 0.5rem 0.9rem; }
      .meta-bar      { font-size: 14px; }
      .result-title a{ font-size: 16px; }
      .result-url    { font-size: 14px; }
      .result-desc   { font-size: 14px; }
      .result-footer { flex-wrap: wrap; }
      .result-dates  { font-size: 14px; flex-wrap: wrap; gap: 0.6rem; }
      .badge         { font-size: 14px; }
      .result-lang,
      .result-score  { font-size: 14px; }
      .page-btn      { font-size: 14px; min-height: 44px; min-width: 44px; }
      .retry-btn     { font-size: 14px; min-height: 44px; }
      .state-msg     { font-size: 14px; }
      .quote         { font-size: 14px; }
      .footer-onion  { font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="skyline">
  <svg viewBox="0 0 700 260" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#071407"/>
        <stop offset="100%" stop-color="#050f05"/>
      </linearGradient>
      <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#00ff41" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <rect x="30"  y="100" width="50" height="160" fill="url(#b1)"/>

    <!-- Windows -->
    <rect x="38"  y="115" width="5" height="4" fill="rgba(0,255,65,0.14)"/>
    <rect x="52"  y="115" width="5" height="4" fill="rgba(0,255,65,0.10)"/>
    <rect x="38"  y="128" width="5" height="4" fill="rgba(0,255,65,0.18)"/>

    <rect x="110" y="88"  width="5" height="4" fill="rgba(0,255,65,0.16)"/>

    <rect x="0"  y="228" width="700" height="32"  fill="rgba(5,15,5,0.85)"/>

    <!-- Accent spires -->
    <rect x="288" y="198" width="4" height="30" fill="rgba(0,255,65,0.35)"/>
    <rect x="348" y="193" width="3" height="35" fill="rgba(0,255,65,0.28)"/>

</div>

<div class="fog"></div>

<div class="page">
  <div class="eyebrow"><span class="dot"></span>tor network · hidden services · 2024</div>

  <h1 class="logo"><span class="logo-dark">DARK</span><span class="logo-seek">SEEK</span></h1>

  <p class="subtitle">search engine for the hidden web</p>

  <form class="search-wrap" action="/" method="get" id="search-form">
    <input id="query" name="q" type="text" placeholder="search hidden services..." autocomplete="off" spellcheck="false" />
    <button type="submit" id="search-btn">Search</button>
  </form>

  <div class="nav-links">
    <a href="/submit" class="submit-link">+ add onion site to index</a>
    <a href="/faq" class="submit-link">// commands</a>
    <a href="/donate" class="submit-link">♥ support darkseek</a>
  </div>

  <div class="stats">
    indexed:&nbsp;<span class="hi" id="stat-count">—</span>&nbsp;pages&nbsp;·&nbsp;tor:&nbsp;online&nbsp;·&nbsp;latency:&nbsp;~<span class="hi" id="stat-latency">—</span>ms
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="" onclick="setCategory(this, '')">All</button>
    <button class="filter-btn" data-cat="forum"   onclick="setCategory(this, 'forum')">Forum</button>
    <button class="filter-btn" data-cat="market"  onclick="setCategory(this, 'market')">Market</button>
    <button class="filter-btn" data-cat="news"    onclick="setCategory(this, 'news')">News</button>
    <button class="filter-btn" data-cat="wiki"    onclick="setCategory(this, 'wiki')">Wiki</button>
    <button class="filter-btn" data-cat="service" onclick="setCategory(this, 'service')">Service</button>
    <button class="filter-btn" data-cat="other"   onclick="setCategory(this, 'other')">Other</button>
  </div>

  <!-- instant answer card target — sits above normal search results -->
  <div id="instant-area" style="width:100%;max-width:640px;"></div>

  <main id="results-area"></main>

  <p class="quote">"information wants to be free" — Stewart Brand, 1984</p>
</div>

<footer class="footer-onion">37mj2uc7...onion</footer>

<script>
  const PAGE_SIZE = 10;
  let state = { query: '', page: 1, category: '', loading: false };

  window.addEventListener('DOMContentLoaded', () => {
    const p   = new URLSearchParams(location.search);
    const q   = p.get('q') || '';
    const cat = p.get('category') || '';
    const pg  = parseInt(p.get('page')) || 1;
    if (q) {
      document.getElementById('query').value = q;
      // A deep-linked query (e.g. from the commands page ?q=...) may itself be
      // a command — route it the same way a typed query would be.
      const cmd = matchCommand(q);
      if (cmd) {
        runCommand(cmd);
      } else {
        state.query    = q;
        state.page     = pg;
        state.category = cat;
        syncCategoryUI(cat);
        fetchResults();
      }
    }
    loadStats();
  });

  const queryEl = document.getElementById('query');

  document.getElementById('search-form').addEventListener('submit', e => {
    e.preventDefault();
    doSearch();
  });

  // Debounced live search while typing. Commands are NOT auto-run here — they
  // wait for an explicit submit so we never fire network calls (ip/shorten) or
  // heavy work on every keystroke.
  const debouncedSearch = debounce(() => {
    const v = queryEl.value.trim();
    if (v && !matchCommand(v)) doSearch();
  }, 300);
  queryEl.addEventListener('input', debouncedSearch);

  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== queryEl) {
      e.preventDefault();
      queryEl.focus();
    } else if (e.key === 'Escape') {
      queryEl.value = '';
      queryEl.focus();
    }
  });

  function debounce(fn, ms) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
  }

  async function loadStats() {
    try {
      const res = await fetch('/stats');
      if (!res.ok) return;
      const data = await res.json();
      const total = data.total ?? data.total_pages;
      if (typeof total === 'number') {
        document.getElementById('stat-count').textContent = total.toLocaleString();
      }
      if (data.latency_ms != null) {
        document.getElementById('stat-latency').textContent = data.latency_ms;
      }
    } catch (e) { /* non-critical */ }
  }

  function doSearch() {
    const q = document.getElementById('query').value.trim();
    if (!q) return;
    // Command interception happens BEFORE any network search.
    const cmd = matchCommand(q);
    if (cmd) { runCommand(cmd); return; }
    clearInstant();
    state.query = q;
    state.page  = 1;
    pushUrl();
    fetchResults();
  }

  function setCategory(btn, cat) {
    state.category = cat;
    state.page = 1;
    syncCategoryUI(cat);
    if (state.query) { pushUrl(); fetchResults(); }
  }

  function syncCategoryUI(cat) {
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
  }

  function goPage(pg) {
    state.page = pg;
    pushUrl();
    fetchResults();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function pushUrl() {
    const p = new URLSearchParams({ q: state.query, page: state.page });
    if (state.category) p.set('category', state.category);
    history.pushState(null, '', '?' + p.toString());
  }

  async function fetchResults() {
    if (state.loading) return;
    state.loading = true;
    document.getElementById('search-btn').disabled = true;
    showLoading();

    const p = new URLSearchParams({ q: state.query, page: state.page });
    if (state.category) p.set('category', state.category);

    try {
      const res = await fetch('/api/search?' + p.toString());
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showError(err.error || `HTTP ${res.status}`);
        return;
      }
      render(await res.json());
    } catch (e) {
      showError('Network error — is the API running?', true);
    } finally {
      state.loading = false;
      document.getElementById('search-btn').disabled = false;
    }
  }

  function showLoading() {
    document.getElementById('results-area').innerHTML =
      '<div class="state-msg"><span class="spinner"></span></div>';
  }

  function showError(msg, retry) {
    const btn = retry
      ? `<div><button class="retry-btn" onclick="fetchResults()">Retry</button></div>`
      : '';
    document.getElementById('results-area').innerHTML =
      `<div class="state-msg error">Error: ${escHtml(msg)}${btn}</div>`;
  }

  function render(data) {
    const area = document.getElementById('results-area');
    if (!data.results || data.results.length === 0) {
      area.innerHTML = '<div class="state-msg">No results found.</div>';
      return;
    }

    const totalPages = Math.ceil(data.total / PAGE_SIZE);

    // Plain terms to highlight, derived from the submitted query (quotes and
    // operators stripped). The URL line is never highlighted.
    const terms = extractTerms(data.query || '');

    const cards = data.results.map(r => `
      <div class="result">
        <div class="result-title">
          <a href="${escAttr(r.url)}" target="_blank" rel="noopener noreferrer">${r.title ? highlight(escHtml(r.title), terms) : escHtml(r.url)}</a>
        </div>
        <div class="result-url">${escHtml(r.url)}</div>
        <div class="result-desc">${highlight(escHtml(r.description || ''), terms)}</div>
        <div class="result-dates">
          <span>scanned: ${escHtml(scannedLabel(r))}</span>
          <span>indexed: ${escHtml(r.indexed_at ? r.indexed_at.slice(0, 10) : '')}</span>
        </div>
        <div class="result-footer">
          <span class="badge ${escAttr(r.category || 'other')}">${escHtml(r.category || 'other')}</span>
          ${r.freshness_tier === 'fresh' ? '<span class="badge-fresh">● FRESH</span>' : ''}
          ${r.freshness_tier === 'archived' ? '<span class="badge-archived">◌ ARCHIVED</span>' : ''}
          ${r.lang ? `<span class="result-lang">${escHtml(r.lang)}</span>` : ''}
          <span class="result-score">score: ${(r.score || 0).toFixed(2)}</span>
        </div>
      </div>
    `).join('');

    const meta = `<div class="meta-bar">${data.total} result${data.total !== 1 ? 's' : ''} for <span>"${escHtml(data.query)}"</span> — page ${data.page} of ${totalPages}</div>`;
    area.innerHTML = meta + cards + renderPagination(data.page, totalPages);
  }

  function renderPagination(current, total) {
    if (total <= 1) return '';
    const prev  = `<button class="page-btn" ${current <= 1 ? 'disabled' : ''} onclick="goPage(${current - 1})">← Prev</button>`;
    const next  = `<button class="page-btn" ${current >= total ? 'disabled' : ''} onclick="goPage(${current + 1})">Next →</button>`;
    const start = Math.max(1, current - 2);
    const end   = Math.min(total, current + 2);
    let pages   = '';
    if (start > 1) pages += `<button class="page-btn" onclick="goPage(1)">1</button>`;
    if (start > 2) pages += `<span style="color:rgba(0,255,65,0.25);padding:0 0.3rem">…</span>`;
    for (let i = start; i <= end; i++) {
      pages += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    if (end < total - 1) pages += `<span style="color:rgba(0,255,65,0.25);padding:0 0.3rem">…</span>`;
    if (end < total)     pages += `<button class="page-btn" onclick="goPage(${total})">${total}</button>`;
    return `<div class="pagination">${prev}${pages}${next}</div>`;
  }

  function relativeDate(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso + 'Z');
    const days = Math.floor(diff / 86400000);
    if (days === 0) return 'today';
    if (days === 1) return 'yesterday';
    return days + ' days ago';
  }

  // "scanned" label for a result. Prefer the API-provided days_since_scan (we
  // never compute freshness client-side); fall back to relativeDate only when
  // an older API response omits the field.
  function scannedLabel(r) {
    const d = r.days_since_scan;
    if (typeof d === 'number') {
      if (d === 0) return 'today';
      if (d === 1) return 'yesterday';
      return d + 'd ago';
    }
    return relativeDate(r.last_seen);
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
  function escAttr(s) { return escHtml(s); }

  // Pull the plain, highlightable words out of a raw query: strip surrounding
  // quotes (phrases become their words), drop -excluded terms and the OR
  // operator. Mirrors the backend parser closely enough for highlighting.
  function extractTerms(query) {
    const terms = [];
    const re = /"([^"]+)"|(\S+)/g;
    let m;
    while ((m = re.exec(query)) !== null) {
      if (m[1] !== undefined) {
        // Quoted phrase: highlight each word inside it.
        m[1].split(/\s+/).forEach(w => { if (w) terms.push(w); });
      } else {
        const tok = m[2];
        if (tok.startsWith('-')) continue;        // excluded term
        if (tok.toUpperCase() === 'OR') continue;  // operator
        terms.push(tok);
      }
    }
    return terms;
  }

  // Wrap matches of any term in <mark>. Input is ALREADY html-escaped, so the
  // only markup we introduce is the <mark> tags themselves. Case-insensitive.
  function highlight(escapedText, terms) {
    if (!terms.length || !escapedText) return escapedText;
    const pat = terms
      .map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))  // escape regex metachars
      .filter(Boolean)
      .join('|');
    if (!pat) return escapedText;
    return escapedText.replace(new RegExp('(' + pat + ')', 'gi'), '<mark>$1</mark>');
  }

  /* =====================================================================
     INSTANT ANSWER COMMANDS
     Typed in the search box, intercepted before hitting the search API.
     matchCommand() is an O(1) prefix check (no regex per keystroke).
     ===================================================================== */

  const CDN_QRCODE   = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  const CDN_SPARKMD5 = 'https://cdnjs.cloudflare.com/ajax/libs/spark-md5/3.0.2/spark-md5.min.js';

  // Parse a raw query into {name, arg}. Returns null for a normal search.
  // Prefix matching is case-insensitive on the command word; the argument
  // keeps its original case (matters for base64/hash/calc).
  function matchCommand(raw) {
    const q = raw.trim();
    const lower = q.toLowerCase();
    if (lower === 'passphrase') return { name: 'passphrase', arg: '' };
    if (lower === 'ip')         return { name: 'ip', arg: '' };

    const pairs = [
      ['base64 encode ', 'b64enc'],
      ['base64 decode ', 'b64dec'],
      ['qr ',            'qr'],
      ['hash ',          'hash'],
      ['sha1 ',          'sha1'],
      ['md5 ',           'md5'],
      ['calc ',          'calc'],
      ['shorten ',       'shorten'],
    ];
    for (const [prefix, name] of pairs) {
      if (lower.startsWith(prefix)) return { name, arg: q.slice(prefix.length).trim() };
    }
    return null;
  }

  // Lazy-load an external script once; resolves when the global is ready.
  // Used so qrcodejs / spark-md5 only download on first use of their command.
  const _loaded = {};
  function loadScript(src) {
    if (_loaded[src]) return _loaded[src];
    _loaded[src] = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.async = true;
      s.onload = () => resolve();
      s.onerror = () => { delete _loaded[src]; reject(new Error('failed to load ' + src)); };
      document.head.appendChild(s);
    });
    return _loaded[src];
  }

  function clearInstant() {
    document.getElementById('instant-area').innerHTML = '';
  }

  // Render the instant answer card. `bodyHtml` is trusted markup built by the
  // caller (callers escape user data themselves). Returns the body element so
  // async handlers (QR, hashes) can fill it in after render.
  function showInstant(name, bodyHtml, opts = {}) {
    clearInstant();
    const card = document.createElement('div');
    card.className = 'instant-card';
    card.innerHTML = `
      <div class="instant-head">// ${escHtml(name)} //
        <button class="instant-close" title="close" aria-label="close">&times;</button>
      </div>
      <div class="instant-body ${opts.qr ? 'qr' : ''} ${opts.err ? 'err' : ''}">${bodyHtml}</div>
      <div class="instant-actions"></div>
      ${opts.note ? `<div class="instant-note">${escHtml(opts.note)}</div>` : ''}
    `;
    document.getElementById('instant-area').appendChild(card);
    card.querySelector('.instant-close').addEventListener('click', clearInstant);

    const actions = card.querySelector('.instant-actions');
    // COPY button copies whatever text the caller supplies.
    if (opts.copy != null) {
      const copyBtn = makeBtn('Copy', () => copyText(String(opts.copy), copyBtn));
      actions.appendChild(copyBtn);
    }
    // Extra buttons, e.g. "regenerate" for passphrase.
    (opts.buttons || []).forEach(b => actions.appendChild(makeBtn(b.label, b.onClick)));
    if (!actions.children.length) actions.remove();

    return card.querySelector('.instant-body');
  }

  function makeBtn(label, onClick) {
    const b = document.createElement('button');
    b.className = 'instant-btn';
    b.textContent = label;
    b.addEventListener('click', onClick);
    return b;
  }

  // Clipboard write with a fallback for non-secure (http) .onion contexts
  // where navigator.clipboard is unavailable.
  async function copyText(text, btn) {
    try {
      await navigator.clipboard.writeText(text);
    } catch (e) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (_) {}
      document.body.removeChild(ta);
    }
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = 'Copied ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
    }
  }

  function instantError(name, msg) {
    showInstant(name, escHtml(msg), { err: true });
  }

  // Dispatch a parsed command to its handler.
  function runCommand(cmd) {
    switch (cmd.name) {
      case 'qr':         return cmdQR(cmd.arg);
      case 'b64enc':     return cmdBase64Encode(cmd.arg);
      case 'b64dec':     return cmdBase64Decode(cmd.arg);
      case 'hash':       return cmdHash('SHA-256', cmd.arg);
      case 'sha1':       return cmdHash('SHA-1', cmd.arg);
      case 'md5':        return cmdMD5(cmd.arg);
      case 'passphrase': return cmdPassphrase();
      case 'calc':       return cmdCalc(cmd.arg);
      case 'ip':         return cmdIP();
      case 'shorten':    return cmdShorten(cmd.arg);
    }
  }

  // --- qr <text> : render QR via qrcodejs (lazy-loaded) ---
  async function cmdQR(text) {
    if (!text) return instantError('qr', 'usage: qr <text>');
    const body = showInstant('qr ' + text, '<span style="color:rgba(0,255,65,0.4)">generating…</span>', { qr: true });
    try {
      await loadScript(CDN_QRCODE);
      body.innerHTML = '';
      new QRCode(body, {
        text,
        width: 180,
        height: 180,
        colorDark: '#00ff41',
        colorLight: '#0a0a0a',
        correctLevel: QRCode.CorrectLevel.M,
      });
    } catch (e) {
      instantError('qr', 'could not load QR library');
    }
  }

  // --- base64 encode <text> : UTF-8 safe via encodeURIComponent/escape ---
  function cmdBase64Encode(text) {
    if (!text) return instantError('base64 encode', 'usage: base64 encode <text>');
    let out;
    try {
      out = btoa(unescape(encodeURIComponent(text)));
    } catch (e) {
      return instantError('base64 encode', 'could not encode input');
    }
    showInstant('base64 encode', escHtml(out), { copy: out });
  }

  // --- base64 decode <text> : reverse of the UTF-8 trick, guarded ---
  function cmdBase64Decode(text) {
    if (!text) return instantError('base64 decode', 'usage: base64 decode <text>');
    let out;
    try {
      out = decodeURIComponent(escape(atob(text)));
    } catch (e) {
      return instantError('base64 decode', 'invalid base64 input');
    }
    showInstant('base64 decode', escHtml(out), { copy: out });
  }

  // --- hash/sha1 <text> : Web Crypto digest (async). Needs a secure context. ---
  async function cmdHash(algo, text) {
    const label = algo === 'SHA-1' ? 'sha1' : 'hash';
    if (!text) return instantError(label, `usage: ${label} <text>`);
    if (!(window.crypto && crypto.subtle)) {
      return instantError(label, 'hashing needs a secure (https) context');
    }
    showInstant(label, '<span style="color:rgba(0,255,65,0.4)">computing…</span>');
    try {
      const buf = await crypto.subtle.digest(algo, new TextEncoder().encode(text));
      const hex = [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
      showInstant(label, escHtml(hex), { copy: hex });
    } catch (e) {
      instantError(label, 'hashing failed');
    }
  }

  // --- md5 <text> : spark-md5 (lazy-loaded, MD5 not in Web Crypto) ---
  async function cmdMD5(text) {
    if (!text) return instantError('md5', 'usage: md5 <text>');
    showInstant('md5', '<span style="color:rgba(0,255,65,0.4)">computing…</span>');
    try {
      await loadScript(CDN_SPARKMD5);
      const hex = SparkMD5.hash(text);
      showInstant('md5', escHtml(hex), { copy: hex });
    } catch (e) {
      instantError('md5', 'could not load MD5 library');
    }
  }

  // 256 common English words for passphrase generation (nouns/adj/verbs mix).
  const PASSPHRASE_WORDS = [
    'able','acid','aged','also','area','army','away','baby','back','ball','band','bank','base','bath','bear','beat',
    'been','beer','bell','belt','bend','bent','best','bird','bite','blue','boat','body','bold','bone','book','boot',
    'born','boss','both','bowl','bulk','burn','bush','busy','cake','call','calm','came','camp','card','care','case',
    'cash','cast','cell','chat','chip','city','clay','club','coal','coat','code','cold','come','cook','cool','cope',
    'copy','core','corn','cost','crew','crop','dark','data','date','dawn','days','dead','deal','dean','dear','debt',
    'deep','deer','desk','dial','diet','dirt','dish','dock','does','done','door','dose','down','draw','drew','drop',
    'drug','drum','dual','duck','dust','duty','each','earn','ease','east','easy','edge','else','even','ever','evil',
    'exit','face','fact','fade','fail','fair','fall','farm','fast','fate','fear','feed','feel','feet','fell','file',
    'fill','film','find','fine','fire','firm','fish','five','flag','flat','flow','food','foot','ford','fork','form',
    'fort','four','free','frog','fuel','full','fund','gain','game','gate','gave','gear','gift','girl','give','glad',
    'goal','goat','gold','golf','gone','good','gray','grew','grid','grip','grow','gulf','hair','half','hall','hand',
    'hang','hard','harm','hate','have','hawk','head','heal','heap','hear','heat','held','hell','help','herb','herd',
    'here','hero','hide','high','hill','hint','hire','hold','hole','holy','home','hood','hook','hope','horn','host',
    'hour','huge','hull','hunt','hurt','icon','idea','idle','inch','into','iron','isle','item','jade','jail','jazz',
    'jobs','join','joke','jump','jury','just','keen','keep','kept','kick','kind','king','kiss','kite','knee','knew',
    'knot','know','lack','lake','lamb','lamp','land','lane','last','late','lava','lawn','lazy','lead','leaf','leak',
  ];

  // --- passphrase : 4 words chosen with CSPRNG (crypto.getRandomValues) ---
  function cmdPassphrase() {
    const n = PASSPHRASE_WORDS.length;            // 256 -> one byte maps cleanly
    const rnd = crypto.getRandomValues(new Uint8Array(4));
    const words = [...rnd].map(b => PASSPHRASE_WORDS[b % n]);
    const phrase = words.join('-');
    showInstant('passphrase', escHtml(phrase), {
      copy: phrase,
      buttons: [{ label: 'Regenerate', onClick: cmdPassphrase }],
    });
  }

  // --- calc <expr> : arithmetic only, strict whitelist, no eval ---
  function cmdCalc(expr) {
    if (!expr) return instantError('calc', 'usage: calc <expression>');
    // Whitelist: digits, + - * / % ( ) . and whitespace. Anything else rejected.
    if (!/^[0-9+\-*/%().\s]+$/.test(expr)) {
      return instantError('calc', 'invalid expression');
    }
    let result;
    try {
      // Function() instead of eval(); input is whitelisted to arithmetic only.
      result = Function('"use strict"; return (' + expr + ')')();
    } catch (e) {
      return instantError('calc', 'invalid expression');
    }
    if (typeof result !== 'number' || !isFinite(result)) {
      return instantError('calc', 'invalid expression');
    }
    const out = String(result);
    showInstant('calc', escHtml(expr + ' = ' + out), { copy: out });
  }

  // --- ip : Tor exit node IP from backend, cached in sessionStorage ---
  async function cmdIP() {
    const NOTE = 'This is your Tor exit node IP, not your real IP.';
    const cached = sessionStorage.getItem('exit_ip');
    if (cached) {
      return showInstant('ip', escHtml(cached), { copy: cached, note: NOTE });
    }
    showInstant('ip', '<span style="color:rgba(0,255,65,0.4)">resolving…</span>');
    try {
      const res = await fetch('/api/ip');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const ip = data.ip || 'unknown';
      sessionStorage.setItem('exit_ip', ip);
      showInstant('ip', escHtml(ip), { copy: ip, note: NOTE });
    } catch (e) {
      instantError('ip', 'could not resolve IP');
    }
  }

  // --- shorten <url> : proxy to TinyURL via backend ---
  async function cmdShorten(url) {
    if (!url) return instantError('shorten', 'usage: shorten <url>');
    showInstant('shorten', '<span style="color:rgba(0,255,65,0.4)">shortening…</span>');
    try {
      const res = await fetch('/api/shorten?url=' + encodeURIComponent(url));
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.short) {
        return instantError('shorten', data.error || 'could not shorten URL');
      }
      showInstant('shorten', escHtml(data.short), { copy: data.short });
    } catch (e) {
      instantError('shorten', 'network error');
    }
  }
</script>

</body>
</html>
