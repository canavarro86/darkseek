services:

  tor-init:
    image: dperson/torproxy:latest
    user: root
    entrypoint: ["sh", "-c", "mkdir -p /var/lib/tor/hidden_service && chown -R 101:101 /var/lib/tor/hidden_service && chmod 700 /var/lib/tor/hidden_service"]
    volumes:
      - tor_keys:/var/lib/tor/hidden_service
    networks:
      - darkseek

  tor:
    image: dperson/torproxy:latest
    user: "root"
    restart: unless-stopped
    depends_on:
      tor-init:
        condition: service_completed_successfully
    volumes:
      - ./tor/torrc:/etc/tor/torrc:ro
      - tor_keys:/var/lib/tor/hidden_service
    networks:
      - darkseek

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    volumes:
      - db_data:/app/db
    depends_on:
      - tor
    networks:
      - darkseek
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  crawler:
    build:
      context: .
      dockerfile: Dockerfile.crawler
    env_file: .env
    volumes:
      - db_data:/app/db
    depends_on:
      api:
        condition: service_healthy
      tor:
        condition: service_started
    networks:
      - darkseek
    restart: on-failure

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - darkseek
    restart: unless-stopped

volumes:
  db_data:
  tor_keys:

networks:
  darkseek:
    driver: bridge
