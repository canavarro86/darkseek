services:

  tor:
    image: osminogin/tor-simple:latest
    user: "root"
    restart: unless-stopped
    # Tor sat at ~105/120MiB (87%, OOM-imminent). Raise the ceiling to 180m and
    # give it a soft floor so the scheduler doesn't reclaim its pages under
    # crawler memory pressure. Envelope: tor 180 + api 180 + nginx 32 +
    # crawler 256 = 648m of 1024m, leaving 376m for the OS + page cache.
    mem_limit: 180m
    mem_reservation: 150m
    volumes:
      - ./tor/torrc:/etc/tor/torrc:ro
      - /opt/onion_hidden_keys:/tmp/hidden_service
    # Normalize the hidden-service key directory before launching tor. Tor
    # refuses to publish (upload the descriptor to the HSDirs) unless that
    # directory is private (mode 0700) and owned by the user tor runs as. The
    # bind mount from /opt/onion_hidden_keys can arrive with host
    # ownership/permissions that silently disable publishing — the exact
    # "no HSDir" symptom seen after the CI rebuild switched the base image and
    # the running user. This touches only metadata, never the persistent keys,
    # so the .onion address is preserved across restarts.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /tmp/hidden_service
        chown -R root:root /tmp/hidden_service
        chmod 700 /tmp/hidden_service
        if [ -f /tmp/hidden_service/hs_ed25519_secret_key ]; then
          chmod 600 /tmp/hidden_service/hs_ed25519_secret_key
        fi
        echo "[entrypoint] hidden_service permissions normalized; starting tor"
        # Bootstrap progress is logged at notice level (see torrc Log directive).
        exec tor -f /etc/tor/torrc
    networks:
      - darkseek
    healthcheck:
      # Verify the SOCKS5 proxy is actually answering: send a no-auth
      # method-negotiation handshake (VER=5, NMETHODS=1, METHOD=0) and expect
      # tor to reply VER=5, METHOD=0 (0x05 0x00). A listening-but-wedged tor
      # therefore reads as unhealthy. nc/od ship in the alpine busybox base.
      test:
        - CMD-SHELL
        - printf '\005\001\000' | nc -w 5 127.0.0.1 9050 | od -An -tx1 | grep -q '05 00'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    mem_limit: 180m
    volumes:
      - /opt/darkseek_db:/app/db
    depends_on:
      - tor
    networks:
      - darkseek
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  crawler:
    build:
      context: .
      dockerfile: Dockerfile.crawler
    env_file: .env
    environment:
      - CRAWLER_WORKERS=5
      - CRAWLER_DELAY=1.5
      - CYCLE_SLEEP=30
    # 256m to fund tor's headroom within the 1GB budget. Peak crawler RSS stays
    # under this: bounded queue/visited set (10k-page run ceiling), streaming
    # enrichment, no full-table loads. Envelope: tor 180 + api 180 + nginx 32 +
    # crawler 256 = 648m of 1024m. See self-review.
    mem_limit: 256m
    volumes:
      - /opt/darkseek_db:/app/db
    depends_on:
      api:
        condition: service_healthy
      tor:
        condition: service_started
    networks:
      - darkseek
    # Continuous seed-week mode: keep the crawler running across restarts.
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f crawler.spider > /dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    mem_limit: 32m
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - darkseek
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  darkseek:
    driver: bridge
